name: "CI-Rust"

on:
  push:
    branches: [main]
    paths:
      - rust-crates/**
      - Cargo.toml
      - Cargo.lock
  pull_request:
    branches: ["**"]
    paths:
      - rust-crates/**
      - Cargo.toml
      - Cargo.lock

permissions:
  contents: read

jobs:
  rust-test:
    name: Rust Tests (${{ matrix.target_arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - { target_arch: amd64, runner: ubuntu-24.04, rust_target: x86_64-unknown-linux-musl }
          - { target_arch: arm64, runner: ubuntu-24.04-arm, rust_target: aarch64-unknown-linux-musl }
    steps:
      - name: Clone code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: ${{ matrix.rust_target }}
          toolchain: 1.97.1
      - name: Install protoc
        uses: ./.github/workflows/protoc
      - name: Tests
        run: make rust-tests
