name: "CI-Rust"

on:
  push:
    branches: [main]
    paths:
      - rust-crates/**
      - Cargo.toml
      - Cargo.lock
  pull_request:
    branches: ["**"]
    paths:
      - rust-crates/**
      - Cargo.toml
      - Cargo.lock

permissions:
  contents: read

jobs:
  rust-test:
    name: Rust Tests (${{ matrix.target_arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - { target_arch: amd64, runner: ubuntu-24.04, rust_target: x86_64-unknown-linux-musl }
          - { target_arch: arm64, runner: ubuntu-24.04-arm, rust_target: aarch64-unknown-linux-musl }
    steps:
      - name: Clone code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.rust_target }}
          toolchain: 1.96.0
      - name: Install protoc
        uses: ./.github/workflows/protoc
      - name: Tests
        run: make rust-tests
